<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PathPilot AI - Career Roadmap Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ================= NAVBAR ================= -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">PathPilot AI</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
      </ul>
    </div>
  </nav>

  <!-- ================= HERO SECTION ================= -->
  <section class="hero">
    <div class="hero-content">
      <h1>Generate Your AI Career Roadmap</h1>
      <p class="subtitle">
        Generate a personalized roadmap with AI, learning resources, videos, and books.
      </p>

      <!-- ================= GENERATOR FORM ================= -->
      <div class="generator-card">
        <div class="form-group">
          <label for="career-select">Choose a Career Path</label>
          <select id="career-select">
            <option value="Web Developer">Web Developer</option>
            <option value="Frontend Developer">Frontend Developer</option>
            <option value="Backend Developer">Backend Developer</option>
            <option value="Full Stack Developer">Full Stack Developer</option>
            <option value="Java Developer">Java Developer</option>
            <option value="Python Developer">Python Developer</option>
            <option value="Data Analyst">Data Analyst</option>
            <option value="Data Scientist">Data Scientist</option>
            <option value="Data Engineer">Data Engineer</option>
            <option value="AI Engineer">AI Engineer</option>
            <option value="Machine Learning Engineer">Machine Learning Engineer</option>
            <option value="Cybersecurity Engineer">Cybersecurity Engineer</option>
            <option value="Cloud Engineer">Cloud Engineer</option>
          </select>
        </div>

        <div class="form-group">
          <label for="skill-select">Skill Level</label>
          <select id="skill-select">
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
          </select>
        </div>

        <button id="generate-btn" class="btn-primary">
          <span id="btn-text">Generate Roadmap</span>
          <span id="btn-spinner" class="spinner hidden"></span>
        </button>

        <!-- Error message with retry -->
        <div id="error-box" class="error-box hidden">
          <p id="error-message">Something went wrong. Please try again.</p>
          <button id="retry-btn" class="btn-secondary">Retry</button>
        </div>
      </div>
    </div>
  </section>

  <script src="main.js"></script>
</body>
</html>
